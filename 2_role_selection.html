<script>
  const rolePages = {
    'restaurant': '3_restaurant_registration.html',
    'hotel':      '3_restaurant_registration.html',
    'ngo':        '5_ngo_registration.html',
    'volunteer':  '6_volunteer_registration.html',
  };

  function selectRole(element) {
    // Remove selection from all cards
    document.querySelectorAll('.role-card').forEach(card => {
      card.classList.remove('card-selected','ring-4','ring-primary-container/20','border-primary');
    });
    // Add selection to clicked card
    element.classList.add('card-selected','ring-4','ring-primary-container/20','border-primary');

    // Store selected role
    const roleText = (element.querySelector('h3')?.textContent || '').trim().toLowerCase();
    let role = 'restaurant';
    if (roleText.includes('ngo')) role = 'ngo';
    else if (roleText.includes('volunteer')) role = 'volunteer';
    localStorage.setItem('fr_selected_role', role);
    localStorage.setItem('fr_role', role);

    // Enable continue button
    const btn = document.getElementById('continue-btn');
    btn.classList.remove('btn-disabled');
    btn.onclick = () => {
      document.body.style.opacity = '0';
      setTimeout(() => { window.location.href = rolePages[role] || '3_restaurant_registration.html'; }, 250);
    };

    // Haptic feel
    element.classList.add('scale-95');
    setTimeout(() => element.classList.remove('scale-95'), 100);
  }

  // Wire "Sign In" / "Already have account" links
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('a, button').forEach(el => {
      const text = el.textContent.trim().toLowerCase();
      if (text.includes('sign in') || text.includes('already have') || text.includes('log in')) {
        el.addEventListener('click', (e) => { e.preventDefault(); window.location.href = '4_login_and_verification.html'; });
      }
    });
  });
</script>

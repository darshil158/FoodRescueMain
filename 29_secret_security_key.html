<style>
        .cyber-glow {
            box-shadow: 0 0 20px rgba(0, 227, 253, 0.3);
            text-shadow: 0 0 10px rgba(0, 227, 253, 0.5);
        }
        .rescue-glow:hover {
            box-shadow: 0 0 25px rgba(229, 57, 53, 0.6);
        }
        .scan-line {
            width: 100%;
            height: 2px;
            background: #00e3fd;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px #00e3fd;
            animation: scanning 3s linear infinite;
        }
        @keyframes scanning {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }

<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center overflow-hidden">

<div class="fixed inset-0 z-0">

</div>
<!-- Main Content Canvas (Transactional Page - Shell Suppressed) -->
<main class="relative z-10 w-full max-w-md mx-auto px-6">
<!-- Authentication Container -->
<div class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-xl overflow-hidden shadow-2xl">
<!-- Identity Header -->
<div class="p-8 pb-0 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-secondary-container/10 border border-secondary-container/30 mb-6 relative overflow-hidden group">
<span class="material-symbols-outlined text-secondary-container text-4xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
<!-- Scanner Animation Overlay -->
<div class="scan-line"></div>
</div>
<h1 class="font-headline-lg text-headline-lg text-secondary-container mb-2 tracking-tight">Level 3 Authentication</h1>
<p class="font-label-lg text-label-lg text-secondary uppercase tracking-widest opacity-80">Secret Access Protocol Required</p>
</div>
<!-- Verification Form -->
<div class="p-8 space-y-6">
<div class="space-y-4">
<div class="relative">
<label class="block text-secondary-fixed-dim font-label-md uppercase mb-2 ml-1">Admin Security Key</label>
<div class="relative">
<input class="w-full bg-background border border-outline-variant rounded-lg px-4 py-4 text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-all duration-300 font-mono-data text-xl tracking-[0.5em]" placeholder="••••••••••••••••" type="password"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary-fixed-dim/50 cursor-pointer hover:text-secondary-fixed-dim transition-colors">visibility_off</span>
</div>
</div>
</div>
<button class="w-full bg-[#E53935] hover:bg-primary-container text-white font-headline-sm text-headline-sm py-4 rounded-lg transition-all duration-300 transform active:scale-95 rescue-glow cyber-glow flex items-center justify-center gap-3 group">
<span>Verify Security Key</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">shield_lock</span>
</button>
</div>
<!-- Separation Line -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<div class="w-2 h-2 rounded-full bg-secondary-container/50"></div>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Warning Box -->

<div class="absolute inset-0 shimmer pointer-events-none opacity-10"></div>
<span class="material-symbols-outlined text-[#E53935] flex-shrink-0" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="text-[#E53935] font-body-sm text-body-sm leading-relaxed">
                        ⚠️ Unauthorized access attempts are logged and flagged for security review. IP logging and biometric cross-referencing active.
                    </p>
</div>
</div>
<!-- Footer Meta -->
<div class="bg-surface-container-highest/50 p-4 border-t border-outline-variant/30 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary-container animate-pulse shadow-[0_0_8px_#00e3fd]"></div>
<span class="font-label-md text-secondary uppercase tracking-tighter">System Live</span>
</div>
<div class="text-on-surface-variant font-mono-data text-xs">
                    NODE: COMMAND_CNTR_04
                </div>
</div>

<div class="mt-8 flex justify-center opacity-30 group">
<div class="relative w-24 h-24 flex items-center justify-center border-2 border-dashed border-secondary-container/40 rounded-full animate-[spin_20s_linear_infinite]">

<div class="w-16 h-16 border border-secondary-container/20 rounded-full"></div>

</div>

</main>
<!-- Interactive Micro-interactions -->
<script>
        // Subtle Mouse Interaction for Glow Offset
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('main');
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            container.style.transform = `translate(${x}px, ${y}px)`;
        });

        // Form Focus Effect
        const keyInput = document.querySelector('input[type="password"]');
        keyInput.addEventListener('focus', () => {
            document.querySelector('.scan-line').style.animationDuration = '1.5s';
        });
        keyInput.addEventListener('blur', () => {
            document.querySelector('.scan-line').style.animationDuration = '3s';
        });
    </script>

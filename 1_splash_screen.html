<!-- Interaction Script -->
<script>
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                // Ripple/Scale effect handled by Tailwind classes, 
                // but could add specific feedback logic here
                console.log('Action triggered:', this.innerText);
            });
        });

        // Simple parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const hero = document.querySelector('.hero-float');
            if(hero) {
                hero.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });

        // Automatic redirection
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (localStorage.getItem('foodRescueToken')) {
                    const role = localStorage.getItem('fr_role') || 'volunteer';
                    if (role === 'restaurant') window.location.href = '7_restaurant_dashboard.html';
                    else if (role === 'ngo') window.location.href = '10_ngo_dashboard.html';
                    else window.location.href = '9_volunteer_dashboard.html';
                } else {
                    window.location.href = '2_role_selection.html';
                }
            }, 3000); // 3 seconds splash
        });
    </script>

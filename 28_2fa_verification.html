<script>
        // OTP Focus Management
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Countdown Timer Logic
        let timeLeft = 45;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "Expired";
                timerElement.classList.add('text-error');
            } else {
                timeLeft--;
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                timerElement.innerText = `00:${seconds}`;
            }
        }, 1000);

        // Submit micro-interaction
        const form = document.getElementById('otp-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> <span>Authenticating...</span>`;
            
            setTimeout(() => {
                btn.classList.add('bg-green-500', 'text-white');
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>Identity Confirmed</span>`;
                setTimeout(() => {
                    alert('Access Granted. Redirecting to Mission Control...');
                    window.location.reload();
                }, 1000);
            }, 2000);
        });

        // Background Atmospheric Effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 10 - 5;
            const y = (e.clientY / window.innerHeight) * 10 - 5;
            const card = document.querySelector('.glass-panel');
            card.style.transform = `perspective(1000px) rotateX(${-y}deg) rotateY(${x}deg)`;
        });
    </script>

  if (!localStorage.getItem("foodRescueToken")) { window.location.href = "27_admin_login_command_center.html"; return; }
  const verifyBtn = document.querySelector("button");
  if (verifyBtn) {
    verifyBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const inputs = document.querySelectorAll("input[type=text], input[type=number]");
      const token = Array.from(inputs).map(i => i.value).join("").trim();
      if (token.length < 6) { alert("Enter full 6-digit code"); return; }
      verifyBtn.textContent = "Verifying..."; verifyBtn.disabled = true;
      try {
        const res = await ApiClient.post("/auth/2fa/verify", { token });
        ApiClient.setToken(res.data.accessToken);
        window.location.href = "30_command_center_gateway.html";
      } catch(err) {
        alert("2FA Failed: " + err.message);
        verifyBtn.textContent = "Verify Code";
        verifyBtn.disabled = false;
      }
    });
  }
});

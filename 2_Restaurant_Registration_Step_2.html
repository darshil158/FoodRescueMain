<script>
        // Micro-interactions for form focus
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label')?.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label')?.classList.remove('text-primary');
            });
        });

        // Prevention of double submit
        function submitStep2(e) {
            e.preventDefault();
            const form = document.querySelector('form');
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Processing...';
            btn.classList.add('opacity-70', 'pointer-events-none');
            
            const surplusElement = document.querySelector('input[name="surplus"]:checked');
            const foodTypesElements = document.querySelectorAll('input[name="foodTypes"]:checked');
            
            let regData = JSON.parse(localStorage.getItem('restaurant_reg_data') || '{}');
            regData.businessName = document.getElementById('restName').value;
            regData.restaurantType = document.getElementById('restType').value;
            regData.fssaiNumber = document.getElementById('restFSSAI').value;
            regData.gstNumber = document.getElementById('restGST').value;
            regData.yearsInBusiness = document.getElementById('restYears').value;
            regData.avgDailyCustomers = document.getElementById('restCustomers').value;
            regData.description = document.getElementById('restDesc').value;
            
            regData.surplusMeals = surplusElement ? surplusElement.value : '';
            regData.foodTypes = Array.from(foodTypesElements).map(el => el.value);

            localStorage.setItem('restaurant_reg_data', JSON.stringify(regData));

            setTimeout(() => {
                window.location.href = '3_Restaurant_Registration_Step_3.html';
            }, 500);
        }
    </script>
